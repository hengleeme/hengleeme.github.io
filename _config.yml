# Site settings
title: Henglee
header-img: "img/Xacebook.jpg"
tagline: "cn"  
description: ""
baseurl: ""
url: "http://hengleeme.github.io"

# About/contact
owner: 
  name: "hengleeme"
  bio: "record the word"

# Data
gavatar: img/favicon64.png
favicon: img/favicon64.png

douban_username:
twitter_username:
github_username: hengleeme
facebook_username: 
weibo_username:
zhihu_username:

# Build settings  
# use Github Flavored Markdown !important  
# document: http://jekyllrb.com/docs/configuration/#kramdown  
markdown: kramdown
highlighter: rouge
permalink: pretty
paginate: 15
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md"]
gems: [jekyll-paginate]

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone: Asia/Shanghai

# Defaults for posts
defaults:
    scope: 
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "hengleeme"
      header-img: "img/green.jpg" # We don't want posts without a header image, that whould mean white on white

# Comments 


# Analytics and webmaster tools stuff goes here
google_analytics:
google_verify:
# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

